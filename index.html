<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Against the Mafia</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <!-- HUD Overlay -->
        <div id="hud">
            <div class="hud-item" id="health-container">
                <span class="icon">❤️</span>
                <div class="bar-bg">
                    <div id="health-bar" class="bar-fill"></div>
                </div>
            </div>
            <div class="hud-item" id="hairball-container">
                <span class="icon">💨</span>
                <span id="hairball-count">0</span>
            </div>
            <div class="hud-item" id="heavy-container">
                <span class="icon">🔥</span>
                <span id="heavy-cooldown">Pronto (F)</span>
            </div>
            <div class="hud-item" id="level-container">
                <span class="icon">🏆</span>
                <span id="level-display">Level 1</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlays -->
        <div id="ui-overlay" class="overlay">
            <div id="start-screen" class="menu-screen active">
                <h1 class="game-title">Cat Against the <span>Mafia</span></h1>
                <p class="subtitle">Por algum motivo, a máfia está atrás de você.</p>
                <button id="start-btn" class="btn primary-btn pulse">INICIAR JORNADA</button>
                <div class="controls-hint">
                    <p>WAD / Setas: Mover | Espaço / W: Pular | E: Atacar | F: Bola de Pelo Maior</p>
                </div>
            </div>

            <div id="game-over-screen" class="menu-screen">
                <h2 class="menu-title">DERROTADO!</h2>
                <p>A máfia o pegou desta vez.</p>
                <button id="restart-btn" class="btn secondary-btn">TENTAR NOVAMENTE</button>
            </div>

            <div id="victory-screen" class="menu-screen">
                <h2 class="menu-title">VITÓRIA!</h2>
                <p>Você venceu a máfia felina!</p>
                <button id="replay-btn" class="btn primary-btn">JOGAR DE NOVO</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
